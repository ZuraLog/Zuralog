name: zuralog
description: "Zuralog — AI Health Assistant Edge Agent"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.1
  web_socket_channel: ^3.0.3

  # Error Monitoring & Crash Reporting
  sentry_flutter: ^8.13.0
  sentry_dio: ^8.13.0

  # Product Analytics & Feature Flags
  posthog_flutter: ^4.7.0

  # Local Storage
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5

  # Lightweight key-value storage (sync status timestamps)
  shared_preferences: ^2.5.4

  # Utilities
  url_launcher: ^6.3.2
  app_links: ^7.0.0  # Deep link / custom URL scheme interception (Phase 1.6)
  cupertino_icons: ^1.0.8

  # Voice Input (Phase STT)
  speech_to_text: ^7.3.0          # On-device speech recognition (free, offline)

  # Push Notifications (Phase 1.9)
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # Subscription & Monetization (Phase 1.13)
  purchases_flutter: ^8.0.0
  purchases_ui_flutter: ^8.0.0
  http: ^1.6.0

  # File & Image Attachment (Coach chat)
  file_picker: ^8.1.7
  image_picker: ^1.1.2            # Camera / photo library picker

  # Phase 2.2 — Screen Implementation
  flutter_markdown_plus: ^1.0.7   # Markdown rendering for AI chat responses (Phase 2.2.2)
  fl_chart: ^1.1.1           # Sparkline and trend charts for Dashboard (Phase 2.2.3)

  # Social OAuth Sign-In (Phase social-oauth)
  google_sign_in: ^6.2.2          # Native Google Sign In (iOS + Android)
  sign_in_with_apple: ^6.1.4      # Native Apple Sign In (iOS; web-based on Android)
  crypto: ^3.0.6                  # SHA-256 nonce hashing for Apple Sign In

  # App metadata (version, build number) — used by AnalyticsInitializer
  package_info_plus: ^9.0.0

  # Share-as-image (Weekly Report)
  screenshot: ^3.0.0
  share_plus: ^10.1.4

  # SVG rendering (for the Zuralog brand logo asset)
  flutter_svg: ^2.0.17

  # Brand logo icon packs (no bundled image assets needed)
  simple_icons: ^14.6.1          # Strava, Garmin, Fitbit, Google, Apple icons
  font_awesome_flutter: ^10.12.0 # Apple, additional brand icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.4
  drift_dev: ^2.28.0
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2
  mockito: ^5.4.6
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ZuraLog-Logo-Main.png"
  min_sdk_android: 21
  adaptive_icon_background: "#344E41"
  adaptive_icon_foreground: "assets/images/ZuraLog-Logo-Sage.png"
  remove_alpha_ios: true

flutter_native_splash:
  # OLED true-black background with the full logo (background included).
  # The Main variant provides a self-contained dark-green framed mark that
  # is legible on any device frame colour during the splash moment.
  color: "#000000"
  image: "assets/images/ZuraLog-Logo-Main.png"
  color_dark: "#000000"
  image_dark: "assets/images/ZuraLog-Logo-Main.png"
  android_12:
    color: "#000000"
    image: "assets/images/ZuraLog-Logo-Main.png"
    color_dark: "#000000"
    image_dark: "assets/images/ZuraLog-Logo-Main.png"
