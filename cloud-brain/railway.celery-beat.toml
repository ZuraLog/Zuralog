# =============================================================================
# ARCHIVED — Beat merged into Worker via --beat flag on 2026-03-10.
#
# Beat runs inside Celery_Worker with --concurrency=2 (prefork). In prefork
# mode, Beat runs in the master process independently of worker child
# processes — it is never blocked by long-running tasks.
#
# RESTORE THIS SERVICE IF: Worker is ever scaled to 2+ replicas.
# Multiple Worker replicas each running Beat = duplicate task execution =
# API rate limit violations and duplicate notifications.
#
# To restore:
#   1. Re-create Celery_Beat service in Railway using this TOML
#   2. Remove --beat from railway.celery-worker.toml and docker-compose.yml
#   3. Remove --beat from the Worker start command in Railway dashboard
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "celery -A app.worker beat --loglevel=info"

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
