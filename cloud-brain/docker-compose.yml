# =============================================================================
# Zuralog Cloud Brain — Docker Compose (Local Development)
# =============================================================================
# Provides PostgreSQL and Redis for local development.
# Usage: docker compose up -d
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: zuralog-postgres
    environment:
      POSTGRES_USER: zuralog
      POSTGRES_PASSWORD: zuralog
      POSTGRES_DB: zuralog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuralog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zuralog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    container_name: zuralog-celery-worker
    # --beat merges the scheduler into the worker process (safe with single replica).
    # If Worker is ever scaled to 2+ replicas, split Beat back to a dedicated service
    # to avoid duplicate task execution.
    command: /app/.venv/bin/celery -A app.worker worker --beat --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
